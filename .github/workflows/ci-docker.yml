name: ci-docker

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  docker-examples:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build cached Lemnos test image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: testing/docker/lemnos-facade.Dockerfile
          load: true
          tags: lemnos-facade-test:ci
          cache-from: type=gha,scope=lemnos-facade-test
          cache-to: type=gha,mode=max,scope=lemnos-facade-test

      - name: Run Docker example suite
        env:
          LEMNOS_SKIP_DOCKER_BUILD: "1"
          LEMNOS_TEST_IMAGE: lemnos-facade-test:ci
        run: cargo test -p lemnos --test docker_facade_examples -- --ignored --nocapture
